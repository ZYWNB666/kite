apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kite
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: kite
    namespace: test
---
kind: ServiceAccount
apiVersion: v1
metadata:
  name: kite
  namespace: test
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    app: kite
  name: kite-storage
  namespace: test
spec:
  storageClassName: openebs-hostpath
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: kite
  name: kite
  namespace: test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kite
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: kite
    spec:
      serviceAccountName: kite
      containers:
        - image: ghcr.io/kite-org/kite:latest
          imagePullPolicy: IfNotPresent
          name: kite
          env:
            - name: DB_TYPE
              value: sqlite
            - name: DB_DSN
              value: /data/kite.db
          resources:
            limits:
              cpu: 1000m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          ports:
            - containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: kite-storage
              mountPath: /data
      volumes:
        - name: kite-storage
          persistentVolumeClaim:
            claimName: kite-storage
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: kite
  name: kite
  namespace: test
spec:
  ports:
    - name: http
      port: 8080
      protocol: TCP
      targetPort: 8080
  selector:
    app: kite
  type: ClusterIP
